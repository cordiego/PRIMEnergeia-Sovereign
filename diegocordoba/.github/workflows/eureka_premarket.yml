name: Eureka Pre-Market Intelligence

on:
  schedule:
    # 7:30 AM ET = 11:30 UTC (Morning pre-market)
    - cron: '30 11 * * 1-5'
    # 2:00 PM ET = 18:00 UTC (Intraday lookahead)
    - cron: '0 18 * * 1-5'
    # 3:00 PM ET = 19:00 UTC (Intraday lookahead)
    - cron: '0 19 * * 1-5'
    # 3:55 PM ET = 19:55 UTC (Power Hour / MOC prediction)
    - cron: '55 19 * * 1-5'
    # 4:15 PM ET = 20:15 UTC (Post-Market Close / NEXT DAY FORECAST)
    - cron: '15 20 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  premarket-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance numpy pandas scipy hmmlearn pandas-market-calendars pandas-datareader statsmodels

      - name: Run Pre-Market Engine
        env:
          PRIME_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          EUREKA_TELEGRAM_BOT_TOKEN: ${{ secrets.EUREKA_TELEGRAM_BOT_TOKEN }}
          PRIME_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd ${{ github.workspace }}
          python scripts/eureka_premarket_cron.py

      - name: Upload pre-market history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: premarket-signal-${{ github.run_id }}
          path: ~/.quantum_portfolio/premarket_history.json
          retention-days: 90
