# PRIMEnergeia Sovereign — Streamlit Cloud Configuration
# ========================================================
# This file configures the Streamlit Cloud deployment.
# Docs: https://docs.streamlit.io/deploy/streamlit-community-cloud

[theme]
primaryColor = "#00d1ff"
backgroundColor = "#050810"
secondaryBackgroundColor = "#0a0f1a"
textColor = "#e0e6ed"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[client]
showErrorDetails = false
toolbarMode = "minimal"
